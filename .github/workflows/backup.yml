name: DB Backup

on:
  schedule:
    # 03:00 UTC daily (≈05:00 Europe/Warsaw winter, 04:00 summer).
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  pg_dump:
    runs-on: ubuntu-latest
    if: ${{ vars.BACKUP_ENABLED == 'true' }}
    steps:
      - name: Check secret presence
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::DATABASE_URL secret is not configured."
            exit 1
          fi

      - name: Install postgres client 16
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-16

      - name: Compute filename
        id: name
        run: echo "filename=wh1-$(date -u +%Y%m%d-%H%M%S).sql.gz" >> "$GITHUB_OUTPUT"

      - name: Dump database
        env:
          # GitHub Actions does not expose ::add-mask:: secrets in logs even when echoed,
          # but pg_dump never needs to print the URL itself.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # SQLAlchemy URLs use postgresql+asyncpg://; pg_dump needs postgresql://.
          PG_URL="${DATABASE_URL/postgresql+asyncpg:/postgresql:}"
          pg_dump --no-owner --no-privileges --format=plain "$PG_URL" | gzip -9 \
            > "${{ steps.name.outputs.filename }}"
          ls -lh "${{ steps.name.outputs.filename }}"

      - name: Upload artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.filename }}
          path: ${{ steps.name.outputs.filename }}
          retention-days: 30
          if-no-files-found: error
