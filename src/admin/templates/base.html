<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }} — wh1</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f6f7f9; color: #222; }
    header { background: #1f2937; color: #fff; padding: 12px 20px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    header a { color: #fff; text-decoration: none; padding: 6px 10px; border-radius: 6px; }
    header a:hover { background: #374151; }
    header .brand { font-weight: 700; margin-right: 16px; }
    main { padding: 20px; max-width: 1200px; margin: 0 auto; }
    h1 { margin: 0 0 16px; font-size: 22px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .card .label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
    .card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    th { background: #f3f4f6; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .footer { color: #6b7280; font-size: 12px; margin-top: 20px; text-align: center; }
    form.inline { display: inline-flex; gap: 6px; align-items: center; margin-left: auto; }
    input[type="number"] { padding: 4px 8px; width: 80px; border: 1px solid #d1d5db; border-radius: 4px; }
    button { padding: 4px 10px; border: 1px solid #d1d5db; background: #fff; border-radius: 4px; cursor: pointer; }
    button:hover { background: #f3f4f6; }
  </style>
</head>
<body>
<header>
  <span class="brand">wh1 admin</span>
  <a href="/">Сводка</a>
  <a href="/calendar">Календарь</a>
  <a href="/users">Работники</a>
  <a href="/sites">Объекты</a>
  <a href="/shifts">Смены</a>
  <a href="/audit">Журнал</a>
</header>
<main>
  <h1>{{ title }}</h1>
  {% block content %}{% endblock %}
  <div class="footer">wh1 — учёт смен</div>
</main>
</body>
</html>
